<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI 网站分析助手</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="header-row">
      <h1 class="title">AI 网站分析</h1>
      <button id="settingsBtn" class="icon-btn" title="设置">⚙</button>
    </div>
    <p class="site" id="siteInfo">等待分析…</p>
  </header>

  <main class="main">
    <button id="analyzeBtn" class="btn primary">开始分析</button>

    <section class="panel" data-question="positioning">
      <div class="panel-header">
        <span class="panel-title">① 定位与差异化</span>
        <span class="panel-status" data-status="positioning"></span>
      </div>
      <div class="panel-body" data-body="positioning" hidden></div>
    </section>

    <section class="panel" data-question="monetization">
      <div class="panel-header">
        <span class="panel-title">② 核心卖点与商业模式</span>
        <span class="panel-status" data-status="monetization"></span>
      </div>
      <div class="panel-body" data-body="monetization" hidden></div>
    </section>

    <section class="panel" data-question="traffic">
      <div class="panel-header">
        <span class="panel-title">③ 流量来源与用户留存</span>
        <span class="panel-status" data-status="traffic"></span>
      </div>
      <div class="panel-body" data-body="traffic" hidden></div>
    </section>

    <div class="actions">
      <button id="copyAllBtn" class="btn ghost" disabled>复制全部</button>
      <button id="retryBtn" class="btn ghost" hidden>重试失败项</button>
    </div>
  </main>

  <footer class="footer">
    <span>v0.4.0 · M4</span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
